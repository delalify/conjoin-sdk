name: Dependency Age Gate

on:
  pull_request:

permissions:
  contents: read

jobs:
  check-age:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Run age gate
        run: |
          script_path="$RUNNER_TEMP/check-age.js"

          if ! git show "${BASE_SHA}:.github/scripts/check-age.js" > "$script_path" 2>/dev/null; then
            cp .github/scripts/check-age.js "$script_path"
          fi

          node "$script_path"
        env:
          MIN_AGE_DAYS: 4
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
