name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch, minor, major, or explicit like 1.2.3)'
        required: true
        type: string
      dry-run:
        description: 'Dry run (no publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm nx run sdk-typescript:build

      - name: Test
        run: pnpm nx run sdk-typescript:test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version
        run: pnpm nx release version ${{ inputs.version }}

      - name: Changelog
        run: pnpm nx release changelog ${{ inputs.version }}

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: pnpm nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Push tags and changelog
        if: ${{ !inputs.dry-run }}
        run: git push --follow-tags
