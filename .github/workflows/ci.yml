name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  affected:
    name: Detect affected projects
    runs-on: blacksmith-4vcpu-ubuntu-2404

    outputs:
      base: ${{ steps.range.outputs.base }}
      head: ${{ steps.range.outputs.head }}
      projects: ${{ steps.projects.outputs.projects }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine affected range
        id: range
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"

            if [[ "$base" =~ ^0+$ ]]; then
              base="$(git rev-list --max-parents=0 "$head")"
            fi
          fi

          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"

      - name: Detect affected projects
        id: projects
        shell: bash
        run: |
          projects="$(pnpm nx show projects --affected --base="${{ steps.range.outputs.base }}" --head="${{ steps.range.outputs.head }}" --json)"
          echo "Affected projects: $projects"
          echo "projects=$projects" >> "$GITHUB_OUTPUT"

  spec:
    name: Spec
    needs: affected
    if: ${{ contains(fromJSON(needs.affected.outputs.projects), 'spec') }}
    uses: ./.github/workflows/check-spec.yml
    with:
      base: ${{ needs.affected.outputs.base }}
      head: ${{ needs.affected.outputs.head }}

  typescript:
    name: TypeScript
    needs: affected
    if: ${{ contains(fromJSON(needs.affected.outputs.projects), 'sdk-typescript') }}
    uses: ./.github/workflows/check-typescript.yml
    with:
      base: ${{ needs.affected.outputs.base }}
      head: ${{ needs.affected.outputs.head }}

  python:
    name: Python
    needs: affected
    if: ${{ contains(fromJSON(needs.affected.outputs.projects), 'sdk-python') }}
    uses: ./.github/workflows/check-python.yml
    with:
      base: ${{ needs.affected.outputs.base }}
      head: ${{ needs.affected.outputs.head }}
