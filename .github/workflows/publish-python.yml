name: Publish Python

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch, minor, major, or explicit like 1.2.3)'
        required: true
        type: string
      repository:
        description: 'Package index'
        required: false
        type: choice
        default: pypi
        options:
          - pypi
          - testpypi
      dry-run:
        description: 'Dry run (no publish)'
        required: false
        type: boolean
        default: false
      first-release:
        description: 'First release (no prior tag exists)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-python-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version and build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: sdks/python/pyproject.toml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: python -m pip install -e "sdks/python[dev]"

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^(patch|minor|major|[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Invalid version input: '$VERSION'. Must be patch, minor, major, or a valid stable version like 1.2.3"
            exit 1
          fi

      - name: Lint
        run: pnpm nx run sdk-python:lint

      - name: Typecheck
        run: pnpm nx run sdk-python:typecheck

      - name: Test
        run: pnpm nx run sdk-python:test

      - name: Build
        run: |
          rm -rf sdks/python/dist
          pnpm nx run sdk-python:build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        env:
          VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs['dry-run'] }}
          FIRST_RELEASE: ${{ inputs['first-release'] }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          if [[ -z "$RELEASE_PAT" ]]; then
            echo "::error::RELEASE_PAT is required to create the release commit, tag, and GitHub release"
            exit 1
          fi

          git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          trap 'git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"' EXIT

          args=(pnpm nx release "$VERSION" --projects=sdk-python --skip-publish)

          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi

          if [[ "$FIRST_RELEASE" == "true" ]]; then
            args+=(--first-release)
          fi

          "${args[@]}"

      - name: Build release distributions
        if: ${{ inputs['dry-run'] == false }}
        run: |
          rm -rf sdks/python/dist
          pnpm nx run sdk-python:build

      - name: Upload distributions
        if: ${{ inputs['dry-run'] == false }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: sdks/python/dist/*
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: ${{ inputs['dry-run'] == false && inputs.repository == 'pypi' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist

  publish-testpypi:
    name: Publish to TestPyPI
    needs: release
    if: ${{ inputs['dry-run'] == false && inputs.repository == 'testpypi' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
